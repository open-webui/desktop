appId: com.openwebui.desktop
productName: Open WebUI
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!svelte.config.mjs'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: CHANGELOG.md
    to: CHANGELOG.md
asarUnpack:
  - resources/**
win:
  executableName: open-webui
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - dmg
    - zip
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
dmg:
  background: build/dmg-background.png
  artifactName: ${name}-${version}.${ext}
  title: ${productName}
  contents:
    - x: 225
      y: 250
      type: file
    - x: 400
      y: 240
      type: link
      path: /Applications
linux:
  target:
    - AppImage
    - snap
    - deb
    - flatpak
  maintainer: openwebui.com
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
flatpak:
  base: org.electronjs.Electron2.BaseApp
  baseVersion: '23.08'
  runtime: org.freedesktop.Platform
  runtimeVersion: '23.08'
  sdk: org.freedesktop.Sdk
  artifactName: ${name}-${version}.flatpak
  finishArgs:
    - --share=ipc
    - --socket=x11
    - --socket=wayland
    - --socket=pulseaudio
    - --share=network
    - --device=dri
    - --filesystem=home
    - --talk-name=org.freedesktop.Notifications
npmRebuild: false
publish:
  provider: github
  owner: open-webui
  repo: desktop
